name: Apply block parity compile fixes

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'agent/jterm1-block-mode-parity' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout parity branch
        uses: actions/checkout@v7
        with:
          ref: agent/jterm1-block-mode-parity
          fetch-depth: 0

      - name: Apply precise source fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply-block-parity-fixes.py
          cargo fmt --all
          rm -f scripts/apply-block-parity-fixes.py .github/workflows/diagnose-block-parity.yml

      - name: Commit fixed source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: complete jterm1 block parity configuration [generated]"
          git push origin HEAD:agent/jterm1-block-mode-parity
