name: Apply block parity round 2

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'agent/jterm1-block-mode-parity-round2' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout round-two branch
        uses: actions/checkout@v7
        with:
          ref: agent/jterm1-block-mode-parity-round2
          fetch-depth: 0
      - name: Apply parity patch
        run: |
          set -euo pipefail
          base64 --decode scripts/round2.patch.gz.b64 | gzip --decompress > /tmp/round2.patch
          git apply --check /tmp/round2.patch
          git apply /tmp/round2.patch
          cargo fmt --all
          rm -f scripts/round2.patch.gz.b64 \
            .github/workflows/export-block-parity-round2.yml \
            .github/workflows/apply-block-parity-round2.yml \
            .round2-trigger .round2-pr-ready .round2-last-trigger \
            .round2-pr .round2-open ROUND2_NOTES.md
      - name: Commit source changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: polish remaining jterm1 block-mode parity"
          git push origin HEAD:agent/jterm1-block-mode-parity-round2
