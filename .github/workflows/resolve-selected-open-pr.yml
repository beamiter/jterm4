name: Resolve selected open PR

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [master]

permissions:
  contents: write

jobs:
  resolve-and-verify:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.head_ref == 'fix/block-mode-selection-input-history' ||
       github.head_ref == 'fix/block-command-capture-sidebar-contrast' ||
       github.head_ref == 'fix/block-command-capture-sidebar-contrast-v2')
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install GTK and VTE development packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Resolve branch against current master
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git fetch origin master

          case "$HEAD_REF" in
            fix/block-mode-selection-input-history)
              git merge --no-edit -X ours origin/master
              python3 .github/scripts/apply_block_mode_ux_final_polish.py
              rm .github/scripts/apply_block_mode_ux_final_polish.py
              rm .github/workflows/apply-block-mode-ux-final-polish.yml
              rm -f .github/pr31-resolver-error.log .github/resolver-test-failure.log
              ;;
            fix/block-command-capture-sidebar-contrast)
              cp .github/scripts/apply_block_capture_contrast_fix.py /tmp/apply_block_capture_contrast_fix.py
              git reset --hard origin/master
              python3 .github/scripts/adapt_pr32_patch.py
              set +e
              python3 /tmp/apply_block_capture_contrast_fix.py > /tmp/pr32-apply.log 2>&1
              apply_status=$?
              set -e
              cat /tmp/pr32-apply.log
              if [ "$apply_status" -ne 0 ]; then
                git reset --hard origin/master
                mkdir -p .github/scripts
                cp /tmp/apply_block_capture_contrast_fix.py .github/scripts/apply_block_capture_contrast_fix.py
                tail -n 500 /tmp/pr32-apply.log > .github/resolver-apply-failure.log
                git add -A
                git commit -m "ci: capture PR 32 patch assertion failure"
                git push --force-with-lease origin HEAD:"$HEAD_REF"
                exit "$apply_status"
              fi
              rm -f .github/resolver-apply-failure.log
              ;;
            fix/block-command-capture-sidebar-contrast-v2)
              git reset --hard origin/master
              rm -f .github/workflows/apply-block-capture-contrast-fix.yml
              ;;
            *)
              echo "Unexpected branch: $HEAD_REF" >&2
              exit 1
              ;;
          esac

      - name: Format
        run: cargo fmt --all

      - name: Test
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          cargo test --all-features --locked 2>&1 | tee /tmp/resolver-test.log

      - name: Persist failed test diagnostics
        if: steps.tests.outcome == 'failure'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          tail -n 500 /tmp/resolver-test.log > .github/resolver-test-failure.log
          git add -A
          git commit -m "ci: capture resolver test failure for ${HEAD_REF}"
          git push --force-with-lease origin HEAD:"$HEAD_REF"
          exit 1

      - name: Clippy
        if: steps.tests.outcome == 'success'
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Commit and push resolved branch
        if: steps.tests.outcome == 'success'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "Resolver produced no changes" >&2
            exit 1
          fi
          git commit -m "fix: resolve ${HEAD_REF} against master"
          git push --force-with-lease origin HEAD:"$HEAD_REF"
