name: Apply modern GTK4 file-tree migration

on:
  push:
    branches:
      - agent/modern-file-tree
    paths:
      - scripts/migrate_modern_file_tree.py
      - .github/workflows/modern-file-tree-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v7
        with:
          ref: agent/modern-file-tree

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: modern-file-tree-migration

      - name: Apply migration
        run: python3 scripts/migrate_modern_file_tree.py

      - name: Format sources
        run: cargo fmt --all

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Remove one-shot migration files
        run: |
          rm scripts/migrate_modern_file_tree.py
          rm .github/workflows/modern-file-tree-migration.yml

      - name: Verify patch cleanliness
        run: git diff --check

      - name: Commit migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md src/main.rs src/ui/mod.rs src/ui/file_tree.rs \
            scripts/migrate_modern_file_tree.py \
            .github/workflows/modern-file-tree-migration.yml
          git diff --cached --quiet && exit 0
          git commit -m "Modernize the GTK file tree"
          git push origin HEAD:agent/modern-file-tree
