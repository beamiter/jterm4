name: Apply project hardening migration

# Branch-local bootstrap. Generated source and repository tooling are validated
# before publication; this workflow is removed after the commit lands.
on:
  pull_request:
    branches:
      - master
    paths:
      - scripts/migrate_project_hardening.py
      - .github/workflows/project-hardening-migration.yml

permissions:
  contents: write

concurrency:
  group: project-hardening-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout upgrade branch
        uses: actions/checkout@v7
        with:
          ref: agent/modern-file-tree

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev \
            shellcheck

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: project-hardening-migration

      - name: Apply migration
        run: python3 scripts/migrate_project_hardening.py

      - name: Format sources
        run: cargo fmt --all

      - name: Check installer scripts
        run: |
          bash -n scripts/install.sh scripts/uninstall.sh
          shellcheck scripts/install.sh scripts/uninstall.sh
          scripts/install.sh --help >/dev/null
          scripts/uninstall.sh --help >/dev/null
          HOME=/tmp/jterm4-home scripts/install.sh \
            --dry-run --backend cargo --prefix /tmp/jterm4-prefix --no-config >/dev/null
          HOME=/tmp/jterm4-home scripts/uninstall.sh \
            --dry-run --prefix /tmp/jterm4-prefix >/dev/null

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Run Clippy
        id: clippy
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log

      - name: Upload Clippy diagnostics
        if: ${{ failure() && steps.clippy.conclusion == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: project-hardening-clippy
          path: clippy.log
          if-no-files-found: error
          retention-days: 1

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features --locked

      - name: Build release binary
        run: cargo build --release --all-features --locked

      - name: Remove migration script
        run: rm scripts/migrate_project_hardening.py

      - name: Verify patch cleanliness
        run: git diff --check

      - name: Commit non-workflow changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          # GITHUB_TOKEN cannot safely publish workflow-file mutations here.
          # Leave those for the authenticated GitHub app after this commit lands.
          git reset -- .github/workflows
          git diff --cached --quiet && exit 0
          git commit -m "Harden privacy, installation, and project tooling"
          git push origin HEAD:agent/modern-file-tree
