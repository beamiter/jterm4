name: Fix round 9 Clippy cleanup

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/jterm4-pane-tree-editor' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jterm4-pane-tree-editor
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Remove stale import
        run: |
          sed -i 's/terminal_working_directory, wrap_with_scrollbar, VteTerminalView/terminal_working_directory, VteTerminalView/' src/ui/tabs.rs
          cargo fmt --all
          git rm .github/workflows/fix-round9-clippy.yml .round9-clippy-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/ui/tabs.rs
          git commit -m "Remove stale pane tree import"
          git push origin HEAD:agent/jterm4-pane-tree-editor
