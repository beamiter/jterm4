name: Resolve native Block split panes

on:
  pull_request:
    branches: [master]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/native-block-splits'
    runs-on: ubuntu-24.04
    timeout-minutes: 70
    steps:
      - name: Check out Block split branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configure clean source branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp .github/scripts/block_split_patch.part00 /tmp/block_split_patch.part00
          cp .github/scripts/block_split_patch.part01 /tmp/block_split_patch.part01
          cp .github/scripts/block_split_patch.part02 /tmp/block_split_patch.part02
          cp .github/scripts/block_split_patch.part03 /tmp/block_split_patch.part03
          git fetch origin master
          git reset --hard origin/master

      - name: Assemble and apply ownership patch
        id: patch
        continue-on-error: true
        run: |
          set -o pipefail
          cat \
            /tmp/block_split_patch.part00 \
            /tmp/block_split_patch.part01 \
            /tmp/block_split_patch.part02 \
            /tmp/block_split_patch.part03 \
            > /tmp/apply_block_native_splits.py
          python3 -m py_compile /tmp/apply_block_native_splits.py
          python3 /tmp/apply_block_native_splits.py 2>&1 | tee native-block-splits.log

      - name: Report patch failure
        if: ${{ steps.patch.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          log = Path('native-block-splits.log').read_text(encoding='utf-8', errors='replace')
          body = (
              'Native Block split patch application failed on current `master`:\n\n'
              '```text\n' + log[-50000:] + '\n```'
          )
          Path('/tmp/pr-comment.json').write_text(json.dumps({'body': body}), encoding='utf-8')
          PY
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data-binary @/tmp/pr-comment.json \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments"
          exit 1

      - name: Install native validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libadwaita-1-dev \
            libgtk-4-dev \
            libpcre2-dev \
            libvte-2.91-gtk4-dev \
            pkg-config

      - name: Format and inspect patch
        run: |
          cargo fmt --all
          git diff --check

      - name: Test
        run: cargo test --all-features --locked

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Commit verified implementation
        run: |
          rm -f native-block-splits.log
          git add -A
          git diff --cached --quiet && { echo "native Block split patch produced no changes" >&2; exit 1; }
          git commit -m "feat: add native Block split panes"
          git push --force origin HEAD:${{ github.head_ref }}
