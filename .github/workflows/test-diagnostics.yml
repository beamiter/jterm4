name: Test diagnostics

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests

      - name: Capture test output
        run: |
          set +e
          cargo test --all-features --locked -- --nocapture 2>&1 | tee test.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test.log
          if-no-files-found: error
          retention-days: 1
