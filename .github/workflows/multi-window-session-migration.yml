name: Apply multi-window session migration

# Branch-local bootstrap. The generated source is validated before publication;
# this workflow is removed through the GitHub app after the commit lands.
on:
  pull_request:
    branches:
      - master
    paths:
      - scripts/migrate_multi_window_sessions.py
      - .github/workflows/multi-window-session-migration.yml

permissions:
  contents: write

concurrency:
  group: multi-window-session-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout upgrade branch
        uses: actions/checkout@v7
        with:
          ref: agent/modern-file-tree

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: multi-window-session-migration

      - name: Apply migration
        run: python3 scripts/migrate_multi_window_sessions.py

      - name: Format sources
        run: cargo fmt --all

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features --locked

      - name: Remove migration script
        run: rm scripts/migrate_multi_window_sessions.py

      - name: Verify patch cleanliness
        run: git diff --check

      - name: Commit migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Make session restore multi-window safe"
          git push origin HEAD:agent/modern-file-tree
