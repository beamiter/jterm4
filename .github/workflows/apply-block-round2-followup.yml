name: Apply block round2 lifecycle follow-up

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'agent/jterm1-block-parity-round2' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout parity branch
        uses: actions/checkout@v7
        with:
          ref: agent/jterm1-block-parity-round2
          fetch-depth: 0

      - name: Apply lifecycle and filter follow-up
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply-block-round2-followup.py
          cargo fmt --all
          rm -f scripts/apply-block-round2-followup.py .github/workflows/apply-block-round2-followup.yml

      - name: Commit source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: align block lifecycle and duration filtering"
          git push origin HEAD:agent/jterm1-block-parity-round2

# Trigger after workflow registration.
