name: Apply pane tree editor migration

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'agent/jterm4-pane-tree-editor' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jterm4-pane-tree-editor
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Introduce pane tree editor
        run: |
          python3 .github/scripts/migrate_round9.py
          cargo fmt --all
          git rm .github/scripts/migrate_round9.py .github/workflows/apply-round9.yml .round9-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/ui/mod.rs src/ui/pane_tree_edit.rs src/ui/tabs.rs src/ui/zoom.rs
          git commit -m "Centralize pane tree collapse operations"
          git push origin HEAD:agent/jterm4-pane-tree-editor
