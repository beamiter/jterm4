name: Fix round 8 Clippy

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/jterm4-pane-node-operations' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jterm4-pane-node-operations
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Remove stale terminal search import
        run: |
          sed -i 's/, find_focused_terminal//' src/ui/tabs.rs
          cargo fmt --all
          git rm .github/workflows/fix-round8-clippy.yml .round8-fix-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/ui/tabs.rs
          git commit -m "Remove stale terminal search import"
          git push origin HEAD:agent/jterm4-pane-node-operations
