name: Publish native Block split fix

on:
  push:
    branches: [master]
    paths:
      - .github/issue-fix-publisher-trigger

permissions:
  contents: write

concurrency:
  group: publish-native-block-splits
  cancel-in-progress: true

jobs:
  native-block-splits:
    name: Verify and publish native Block splits
    runs-on: ubuntu-24.04
    timeout-minutes: 70
    steps:
      - name: Check out staged Block split branch
        uses: actions/checkout@v4
        with:
          ref: agent/native-block-splits
          fetch-depth: 0

      - name: Configure clean source branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp .github/scripts/block_split_patch.part00 /tmp/block_split_patch.part00
          cp .github/scripts/block_split_patch.part01 /tmp/block_split_patch.part01
          cp .github/scripts/block_split_patch.part02 /tmp/block_split_patch.part02
          cp .github/scripts/block_split_patch.part03 /tmp/block_split_patch.part03
          git fetch origin master
          git reset --hard origin/master

      - name: Assemble and apply ownership patch
        run: |
          cat \
            /tmp/block_split_patch.part00 \
            /tmp/block_split_patch.part01 \
            /tmp/block_split_patch.part02 \
            /tmp/block_split_patch.part03 \
            > /tmp/apply_block_native_splits.py
          python3 -m py_compile /tmp/apply_block_native_splits.py
          set +e
          python3 /tmp/apply_block_native_splits.py > /tmp/native-block-splits.log 2>&1
          patch_status=$?
          set -e
          cat /tmp/native-block-splits.log
          if [ "$patch_status" -ne 0 ]; then
            git reset --hard origin/master
            mkdir -p .github/scripts
            cp /tmp/block_split_patch.part00 .github/scripts/block_split_patch.part00
            cp /tmp/block_split_patch.part01 .github/scripts/block_split_patch.part01
            cp /tmp/block_split_patch.part02 .github/scripts/block_split_patch.part02
            cp /tmp/block_split_patch.part03 .github/scripts/block_split_patch.part03
            cp /tmp/native-block-splits.log .github/native-block-split-patch-failure.log
            git add .github/scripts/block_split_patch.part* .github/native-block-split-patch-failure.log
            git commit -m "ci: capture native Block split patch failure"
            git push --force origin HEAD:agent/native-block-splits
            exit "$patch_status"
          fi

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libadwaita-1-dev \
            libgtk-4-dev \
            libpcre2-dev \
            libvte-2.91-gtk4-dev \
            pkg-config

      - name: Format, test and lint
        id: validation
        continue-on-error: true
        run: |
          set -o pipefail
          {
            cargo fmt --all
            git diff --check
            cargo test --all-features --locked
            cargo clippy --all-targets --all-features --locked -- -D warnings
          } 2>&1 | tee /tmp/native-block-validation.log

      - name: Persist validation failure
        if: ${{ steps.validation.outcome == 'failure' }}
        run: |
          git reset --hard origin/master
          mkdir -p .github/scripts
          cp /tmp/block_split_patch.part00 .github/scripts/block_split_patch.part00
          cp /tmp/block_split_patch.part01 .github/scripts/block_split_patch.part01
          cp /tmp/block_split_patch.part02 .github/scripts/block_split_patch.part02
          cp /tmp/block_split_patch.part03 .github/scripts/block_split_patch.part03
          cp /tmp/native-block-validation.log .github/native-block-split-validation-failure.log
          git add .github/scripts/block_split_patch.part* .github/native-block-split-validation-failure.log
          git commit -m "ci: capture native Block split validation failure"
          git push --force origin HEAD:agent/native-block-splits
          exit 1

      - name: Publish verified implementation
        if: ${{ steps.validation.outcome == 'success' }}
        run: |
          rm -f .github/native-block-split-patch-failure.log \
            .github/native-block-split-validation-failure.log
          git add -A
          git diff --cached --quiet && { echo "native Block split patch produced no source changes" >&2; exit 1; }
          git commit -m "feat: add native Block split panes"
          git push --force origin HEAD:agent/native-block-splits
