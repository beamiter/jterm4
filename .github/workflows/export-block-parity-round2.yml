name: Export block parity round 2

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    if: ${{ github.head_ref == 'agent/jterm1-block-mode-parity-round2' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout jterm4
        uses: actions/checkout@v7
        with:
          ref: agent/jterm1-block-mode-parity-round2
      - name: Checkout jterm1 reference
        run: git clone --depth=1 https://github.com/beamiter/jterm1.git /tmp/jterm1
      - name: Pack sources
        run: |
          tar --exclude=.git --exclude=target -czf /tmp/jterm4-round2.tar.gz .
          tar --exclude=.git --exclude=target -C /tmp/jterm1 -czf /tmp/jterm1-round2.tar.gz .
      - name: Upload jterm4
        uses: actions/upload-artifact@v4
        with:
          name: jterm4-round2-source
          path: /tmp/jterm4-round2.tar.gz
          retention-days: 1
      - name: Upload jterm1
        uses: actions/upload-artifact@v4
        with:
          name: jterm1-round2-source
          path: /tmp/jterm1-round2.tar.gz
          retention-days: 1
