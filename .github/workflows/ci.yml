name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        id: fmt
        run: cargo fmt --all -- --check

      - name: Generate formatting patch
        if: ${{ failure() && steps.fmt.conclusion == 'failure' }}
        run: |
          cargo fmt --all
          git diff -- . > rustfmt.patch

      - name: Upload formatting diagnostics
        if: ${{ failure() && steps.fmt.conclusion == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: rustfmt-diagnostics
          path: rustfmt.patch
          if-no-files-found: error
          retention-days: 1

  shell:
    name: Shell scripts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y shellcheck

      - name: Check installer scripts
        run: |
          bash -n scripts/install.sh scripts/uninstall.sh
          shellcheck scripts/install.sh scripts/uninstall.sh
          scripts/install.sh --help >/dev/null
          scripts/uninstall.sh --help >/dev/null

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy

      - name: Run Clippy
        id: clippy
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log

      - name: Upload Clippy diagnostics
        if: ${{ failure() && steps.clippy.conclusion == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: clippy-diagnostics
          path: clippy.log
          if-no-files-found: error
          retention-days: 1

  rustdoc:
    name: Rustdoc
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rustdoc

      - name: Check documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features --locked

  test:
    name: Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests

      - name: Run tests
        run: cargo test --all-features --locked

  release-build:
    name: Release build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Build release binary
        run: cargo build --release --all-features --locked
