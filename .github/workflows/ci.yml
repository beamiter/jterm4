name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  apply-parity:
    name: Apply staged jterm1 parity
    if: ${{ github.event_name == 'pull_request' && github.head_ref == 'agent/jterm1-block-mode-parity' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v7
        with:
          ref: agent/jterm1-block-mode-parity
          fetch-depth: 0

      - name: Apply and format migration
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/parity_parts/part_00 > /tmp/apply-jterm1-parity.py
          for part in scripts/parity_parts/part_*.b64; do
            base64 --decode "$part" >> /tmp/apply-jterm1-parity.py
          done
          python3 -m py_compile /tmp/apply-jterm1-parity.py
          python3 /tmp/apply-jterm1-parity.py
          cargo fmt --all
          rm -rf scripts/parity_parts .github/workflows/apply-jterm1-block-parity.yml
          git fetch origin master --depth=1
          git show origin/master:.github/workflows/ci.yml > .github/workflows/ci.yml

      - name: Commit generated source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: align block actions with jterm1 [generated parity]"
          git push origin HEAD:agent/jterm1-block-mode-parity

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        id: fmt
        run: cargo fmt --all -- --check

      - name: Generate formatting patch
        if: ${{ failure() && steps.fmt.conclusion == 'failure' }}
        run: |
          cargo fmt --all
          git diff -- src/pty.rs src/block_view/scroll.rs > rustfmt.patch

      - name: Upload formatting diagnostics
        if: ${{ failure() && steps.fmt.conclusion == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: rustfmt.patch
          if-no-files-found: error
          retention-days: 1

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy

      - name: Run Clippy
        id: clippy
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log

      - name: Upload Clippy diagnostics
        if: ${{ failure() && steps.clippy.conclusion == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.log
          if-no-files-found: error
          retention-days: 1

  rustdoc:
    name: Rustdoc
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rustdoc

      - name: Check documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features --locked

  test:
    name: Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests

      - name: Run tests
        run: cargo test --all-features --locked

  release-build:
    name: Release build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Build release binary
        run: cargo build --release --all-features --locked
