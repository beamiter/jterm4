name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        id: fmt
        run: cargo fmt --all -- --check

      - name: Generate formatting patch
        if: ${{ failure() && steps.fmt.conclusion == 'failure' }}
        run: |
          cargo fmt --all
          git diff -- . > rustfmt.patch

      - name: Upload formatting diagnostics
        if: ${{ failure() && steps.fmt.conclusion == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: rustfmt-diagnostics
          path: |
            rustfmt.patch
            src/ui/command_correction.rs
          if-no-files-found: error
          retention-days: 1

  fix-command-correction:
    name: Apply command-correction diagnostics
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install Rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply formatting and reviewed fixes
        run: |
          cargo fmt --all
          python - <<'PY'
          from pathlib import Path

          path = Path("src/ui/command_correction.rs")
          source = path.read_text()

          replacements = [
              (
                  '''    let Some(path) = std::env::var_os("PATH") else {
                      return Vec::new();
                  };
          ''',
                  '''    // In Flatpak, the process PATH describes the sandbox rather than the host
                  // where terminal commands run. If the host bash probe was unavailable, do
                  // not present sandbox executables as verified host candidates.
                  if crate::host::is_flatpak() {
                      return Vec::new();
                  }

                  let Some(path) = std::env::var_os("PATH") else {
                      return Vec::new();
                  };
          ''',
              ),
              (
                  '''    for index in 0..=right.len() {
                      matrix[0][index] = index;
                  }
          ''',
                  '''    for (index, value) in matrix[0].iter_mut().enumerate() {
                      *value = index;
                  }
          ''',
              ),
              (
                  '''    for (start, _) in command.match_indices(old) {
                      let end = start + old.len();
                      let previous = command[..start].chars().next_back();
                      let next = command[end..].chars().next();
                      if previous.is_some_and(is_shell_word_character)
                          || next.is_some_and(is_shell_word_character)
                      {
                          continue;
                      }

                      let mut replacement = String::with_capacity(command.len() + new.len());
                      replacement.push_str(&command[..start]);
                      replacement.push_str(new);
                      replacement.push_str(&command[end..]);
                      return Some(replacement);
                  }
                  None
          ''',
                  '''    let mut matches = command.match_indices(old).filter_map(|(start, _)| {
                      let end = start + old.len();
                      let previous = command[..start].chars().next_back();
                      let next = command[end..].chars().next();
                      (!previous.is_some_and(is_shell_word_character)
                          && !next.is_some_and(is_shell_word_character))
                      .then_some(start)
                  });
                  let start = matches.next()?;
                  // When the same token appears more than once, guessing which occurrence
                  // failed can silently change an unrelated argument. Leave that case to the
                  // editable AI fallback instead of claiming a deterministic correction.
                  if matches.next().is_some() {
                      return None;
                  }

                  let end = start + old.len();
                  let mut replacement = String::with_capacity(command.len() + new.len());
                  replacement.push_str(&command[..start]);
                  replacement.push_str(new);
                  replacement.push_str(&command[end..]);
                  Some(replacement)
          ''',
              ),
              (
                  '''    let title = if correction.evidence.is_verified() {
                      "Verified command correction"
                  } else {
                      "AI found a possible correction"
                  };
          ''',
                  '''    let title = match correction.evidence {
                      CorrectionEvidence::AptIndex | CorrectionEvidence::ExecutablePath => {
                          "Verified command correction"
                      }
                      CorrectionEvidence::TargetOutput => "The command suggested a correction",
                      CorrectionEvidence::AiUnverified => "AI found a possible correction",
                  };
          ''',
              ),
              (
                  '''    } else {
                      body.push_str(
                          "\\n\\nThis AI-only proposal is unverified and can only be inserted for review.",
                      );
                  }
          ''',
                  '''    } else if correction.evidence == CorrectionEvidence::TargetOutput {
                      body.push_str(
                          "\\n\\nThis tool-provided proposal is not independently verified and can only be inserted for review.",
                      );
                  } else {
                      body.push_str(
                          "\\n\\nThis AI-only proposal is unverified and can only be inserted for review.",
                      );
                  }
          ''',
              ),
              (
                  '''        assert!(replace_shell_word("/opt/fmpg/bin/run", "fmpg", "ffmpeg").is_none());
          ''',
                  '''        assert!(replace_shell_word("/opt/fmpg/bin/run", "fmpg", "ffmpeg").is_none());
                  assert!(replace_shell_word("printf fmpg; apt install fmpg", "fmpg", "ffmpeg").is_none());
          ''',
              ),
          ]

          for old, new in replacements:
              if old not in source:
                  raise SystemExit(f"expected source fragment not found:\n{old}")
              source = source.replace(old, new, 1)

          path.write_text(source)
          PY
          cargo fmt --all

      - name: Commit fixes to PR branch
        run: |
          if git diff --quiet -- src/ui/command_correction.rs; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ui/command_correction.rs
          git commit -m "Polish verified command correction"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  shell:
    name: Shell scripts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y shellcheck

      - name: Check installer and smoke scripts
        run: |
          bash -n scripts/install.sh scripts/uninstall.sh scripts/smoke-flatpak.sh \
            scripts/support-bundle.sh scripts/package-release.sh packaging/install-release.sh
          shellcheck scripts/install.sh scripts/uninstall.sh scripts/smoke-flatpak.sh \
            scripts/support-bundle.sh scripts/package-release.sh packaging/install-release.sh
          scripts/install.sh --help >/dev/null
          scripts/uninstall.sh --help >/dev/null

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy

      - name: Run Clippy
        id: clippy
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log

      - name: Upload Clippy diagnostics
        if: ${{ failure() && steps.clippy.conclusion == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: clippy-diagnostics
          path: clippy.log
          if-no-files-found: error
          retention-days: 1

  rustdoc:
    name: Rustdoc
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rustdoc

      - name: Check documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features --locked

  test:
    name: Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests

      - name: Run tests
        run: cargo test --all-features --locked

  release-build:
    name: Release build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Build release binary
        run: cargo build --release --all-features --locked

      - name: Build and verify relocatable release bundle
        run: |
          bash scripts/package-release.sh target/release/jterm4
          (cd target/dist && sha256sum --check *.sha256)

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: jterm4-${{ github.sha }}
          path: target/dist/*
          if-no-files-found: error
          retention-days: 7

  nix:
    name: Nix package
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Evaluate and build flake checks
        run: nix flake check --no-write-lock-file --print-build-logs
