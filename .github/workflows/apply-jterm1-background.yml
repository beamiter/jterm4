name: Export formatted parity source

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    if: ${{ github.head_ref == 'agent/jterm1-block-mode-parity' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout parity branch
        uses: actions/checkout@v7
        with:
          ref: agent/jterm1-block-mode-parity

      - name: Pack formatted source
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=target -czf /tmp/jterm4-formatted-parity-source.tar.gz .

      - name: Upload formatted source
        uses: actions/upload-artifact@v4
        with:
          name: jterm4-formatted-parity-source
          path: /tmp/jterm4-formatted-parity-source.tar.gz
          if-no-files-found: error
          retention-days: 1
