name: Command correction final validation

on:
  push:
    branches:
      - agent/smart-command-correction
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/smart-command-correction
          fetch-depth: 0

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev \
            pkg-config

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Run project quality gates
        id: gates
        shell: bash
        run: |
          set +e
          cargo fmt --all -- --check > /tmp/fmt.log 2>&1
          fmt_status=$?
          cargo test --all-features --locked > /tmp/test.log 2>&1
          test_status=$?
          cargo clippy --all-targets --all-features --locked -- -D warnings > /tmp/clippy.log 2>&1
          clippy_status=$?
          RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features --locked > /tmp/doc.log 2>&1
          doc_status=$?
          cargo build --release --all-features --locked > /tmp/build.log 2>&1
          build_status=$?

          if [ "$fmt_status" -eq 0 ] && [ "$test_status" -eq 0 ] && [ "$clippy_status" -eq 0 ] && [ "$doc_status" -eq 0 ] && [ "$build_status" -eq 0 ]; then
            conclusion=passed
          else
            conclusion=failed
          fi

          {
            echo "## Smart command correction validation"
            echo
            echo "| Gate | Exit status |"
            echo "|---|---:|"
            echo "| rustfmt | $fmt_status |"
            echo "| tests | $test_status |"
            echo "| Clippy (-D warnings) | $clippy_status |"
            echo "| Rustdoc (-D warnings) | $doc_status |"
            echo "| release build | $build_status |"
            echo
            echo "Result: **$conclusion**."
          } > /tmp/comment.md

          if [ "$conclusion" = failed ]; then
            for pair in fmt:/tmp/fmt.log test:/tmp/test.log clippy:/tmp/clippy.log doc:/tmp/doc.log build:/tmp/build.log; do
              name=${pair%%:*}
              file=${pair#*:}
              echo >> /tmp/comment.md
              echo "<details><summary>$name diagnostics (tail)</summary>" >> /tmp/comment.md
              echo >> /tmp/comment.md
              echo '```text' >> /tmp/comment.md
              tail -n 120 "$file" >> /tmp/comment.md
              echo '```' >> /tmp/comment.md
              echo "</details>" >> /tmp/comment.md
            done
          fi

          echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish validation report
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 29 --repo beamiter/jterm4 --body-file /tmp/comment.md

      - name: Remove all one-shot workflows
        shell: bash
        run: |
          git pull --rebase origin agent/smart-command-correction
          for path in \
            .github/workflows/command-fix-autofix.yml \
            .github/workflows/command-fix-autofix-cleanup.yml \
            .github/workflows/command-fix-mechanical-repair.yml \
            .github/workflows/command-fix-final-validation.yml; do
            if [ -e "$path" ]; then
              git rm -f "$path"
            fi
          done
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "remove temporary command correction workflows"
          git push origin HEAD:agent/smart-command-correction

      - name: Fail when a gate failed
        if: steps.gates.outputs.conclusion != 'passed'
        run: exit 1
