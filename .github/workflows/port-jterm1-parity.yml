name: Apply long-block parity patch

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'agent/jterm1-block-mode-parity' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout parity branch
        uses: actions/checkout@v7
        with:
          ref: agent/jterm1-block-mode-parity
          fetch-depth: 0

      - name: Apply long-block navigation patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode scripts/jterm1-long-nav.patch.gz.b64 | gzip --decompress > /tmp/jterm1-long-nav.patch
          git apply --check /tmp/jterm1-long-nav.patch
          git apply /tmp/jterm1-long-nav.patch
          cargo fmt --all
          rm -f scripts/jterm1-long-nav.patch.gz.b64 .github/workflows/port-jterm1-parity.yml

      - name: Commit generated source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: align long block navigation with jterm1 [generated]"
          git push origin HEAD:agent/jterm1-block-mode-parity
