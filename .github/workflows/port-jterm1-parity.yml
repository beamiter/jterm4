name: Export parity source snapshots

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    if: ${{ github.head_ref == 'agent/jterm1-block-mode-parity' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout jterm4 parity branch
        uses: actions/checkout@v7
        with:
          ref: agent/jterm1-block-mode-parity
          fetch-depth: 0

      - name: Fetch jterm1 reference
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/beamiter/jterm1.git /tmp/jterm1

      - name: Pack source snapshots
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=target -czf /tmp/jterm4-parity-source.tar.gz .
          tar --exclude=.git --exclude=target -C /tmp/jterm1 -czf /tmp/jterm1-reference-source.tar.gz .

      - name: Upload jterm4 source
        uses: actions/upload-artifact@v4
        with:
          name: jterm4-parity-source
          path: /tmp/jterm4-parity-source.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Upload jterm1 source
        uses: actions/upload-artifact@v4
        with:
          name: jterm1-reference-source
          path: /tmp/jterm1-reference-source.tar.gz
          if-no-files-found: error
          retention-days: 1
