name: Apply PaneLeaf tab migration

on:
  push:
    branches:
      - agent/jterm4-pane-leaf-tab-creation

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jterm4-pane-leaf-tab-creation

      - name: Route tab construction through PaneLeaf
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/ui/tabs.rs')
          text = path.read_text(encoding='utf-8')
          text = text.replace('TerminalViewType::', 'PaneLeaf::')

          start = text.index('        // Get the widget from the view')
          end = text.index('        let ui_for_close', start)
          replacement = '''        // PaneLeaf owns the distinction between Block and conventional VTE
          // roots. Tab construction only requires the common GTK leaf widget.
          let term_wrapper = view_type
              .root_widget()
              .downcast::<gtk4::Box>()
              .expect("pane root must be a Box");

          // Keep controller attachment behind PaneLeaf's single GTK object-data
          // boundary. Block tabs no longer publish a second legacy `term-view` key.
          let term_wrapper_for_name = term_wrapper.clone();
          term_wrapper_for_name.set_widget_name(&format!("tab-{}", tab_num));
          let term_wrapper_widget = term_wrapper.clone().upcast::<gtk4::Widget>();
          view_type.attach_to(&term_wrapper_widget);

          '''
          text = text[:start] + replacement + text[end:]
          path.write_text(text, encoding='utf-8')
          PY

          cargo fmt --all
          rm .github/workflows/apply-pane-leaf-tab-creation.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/ui/tabs.rs .github/workflows/apply-pane-leaf-tab-creation.yml
          git commit -m "Route tab construction through PaneLeaf"
          git push origin HEAD:agent/jterm4-pane-leaf-tab-creation
