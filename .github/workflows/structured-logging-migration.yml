name: Apply structured logging migration

# Branch-local bootstrap. Generated source is validated before publication;
# this workflow is removed through the GitHub app after the commit lands.
on:
  pull_request:
    branches:
      - master
    paths:
      - scripts/migrate_structured_logging.py
      - .github/workflows/structured-logging-migration.yml

permissions:
  contents: write

concurrency:
  group: structured-logging-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout upgrade branch
        uses: actions/checkout@v7
        with:
          ref: agent/modern-file-tree

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: structured-logging-migration

      - name: Apply migration
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/migrate_structured_logging.py")
          text = path.read_text()
          text = text.replace(
              "use log::{LevelFilter, Log, Metadata, Record};\nuse std::time::Instant;",
              "use log::{LevelFilter, Log, Metadata, Record};\nuse std::cmp::Reverse;\nuse std::time::Instant;",
              1,
          )
          text = text.replace(
              """    fn max_level(&self) -> LevelFilter {
                  self.directives
                      .iter()
                      .map(|(_, level)| *level)
                      .fold(self.default_level, std::cmp::max)
              }
          """,
              """    fn max_level(&self) -> LevelFilter {
                  let mut max_level = self.default_level;
                  for (_, level) in &self.directives {
                      max_level = max_level.max(*level);
                  }
                  max_level
              }
          """,
              1,
          )
          text = text.replace(
              "directives.sort_by(|left, right| right.0.len().cmp(&left.0.len()));",
              "directives.sort_by_key(|(target, _)| Reverse(target.len()));",
              1,
          )
          path.write_text(text)
          PY
          python3 scripts/migrate_structured_logging.py

      - name: Format sources
        run: cargo fmt --all

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Run Clippy
        id: clippy
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log

      - name: Upload Clippy diagnostics
        if: ${{ failure() && steps.clippy.conclusion == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: structured-logging-clippy
          path: clippy.log
          if-no-files-found: error
          retention-days: 1

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features --locked

      - name: Build release binary
        run: cargo build --release --all-features --locked

      - name: Remove migration script
        run: rm scripts/migrate_structured_logging.py

      - name: Verify patch cleanliness
        run: git diff --check

      - name: Commit migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Add target-aware structured logging"
          git push origin HEAD:agent/modern-file-tree
