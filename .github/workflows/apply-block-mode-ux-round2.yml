name: Apply block mode UX round 2

on:
  push:
    branches:
      - fix/block-mode-selection-input-history
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'pull_request' || contains(github.event.head_commit.message, 'run block mode UX round2'))
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out fix branch
        uses: actions/checkout@v7
        with:
          ref: fix/block-mode-selection-input-history

      - name: Install GTK and VTE development packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Apply focused Block-mode fixes
        run: python3 .github/scripts/apply_block_mode_ux_round2.py

      - name: Format
        run: cargo fmt --all

      - name: Test
        run: cargo test --all-features --locked

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Remove one-shot patch machinery
        run: |
          rm .github/scripts/apply_block_mode_ux_round2.py
          rm .github/scripts/.apply-block-mode-ux-round2-trigger
          rm .github/workflows/apply-block-mode-ux-round2.yml

      - name: Commit verified fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: polish Block selection and input state"
          git push origin HEAD:fix/block-mode-selection-input-history
