name: Resolve and verify PR 31

on:
  push:
    branches:
      - fix/block-mode-selection-input-history

permissions:
  contents: write

jobs:
  resolve-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/block-mode-selection-input-history
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge current master and resolve overlapping Block changes
        run: |
          git fetch origin master
          git merge --no-edit -X ours origin/master

      - name: Install GTK and VTE development packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev

      - name: Apply final Block-mode polish
        run: python3 .github/scripts/apply_block_mode_ux_final_polish.py

      - name: Format
        run: cargo fmt --all

      - name: Test
        run: cargo test --all-features --locked

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Remove one-shot patch machinery
        run: |
          rm .github/scripts/apply_block_mode_ux_final_polish.py
          rm .github/workflows/apply-block-mode-ux-final-polish.yml

      - name: Commit and push resolved branch
        run: |
          git add -A
          git commit -m "fix: resolve master conflicts and finalize Block polish"
          git push origin HEAD:fix/block-mode-selection-input-history
