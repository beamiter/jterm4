name: Apply remaining block parity

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'agent/jterm1-block-parity-round2' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout parity branch
        uses: actions/checkout@v7
        with:
          ref: agent/jterm1-block-parity-round2
          fetch-depth: 0

      - name: Apply audited parity patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode scripts/jterm1-block-round2.patch.gz.b64 | gzip --decompress > /tmp/jterm1-block-round2.patch
          git apply --check /tmp/jterm1-block-round2.patch
          git apply /tmp/jterm1-block-round2.patch
          cargo fmt --all
          rm -f scripts/jterm1-block-round2.patch.gz.b64 .github/workflows/export-block-parity-snapshots.yml

      - name: Commit source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: align remaining jterm1 block details"
          git push origin HEAD:agent/jterm1-block-parity-round2
