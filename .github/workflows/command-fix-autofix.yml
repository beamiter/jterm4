name: Command correction autofix

on:
  push:
    branches:
      - agent/smart-command-correction
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/smart-command-correction
          fetch-depth: 0

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libpcre2-dev \
            pkg-config

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Apply compiler and Clippy suggestions
        run: |
          cargo fix --all-targets --all-features --locked --allow-dirty --allow-staged --broken-code || true
          cargo clippy --fix --all-targets --all-features --locked --allow-dirty --allow-staged || true
          cargo fmt --all

      - name: Verify after fixes
        run: |
          cargo check --all-targets --all-features --locked
          cargo clippy --all-targets --all-features --locked -- -D warnings
          cargo fmt --all -- --check

      - name: Commit mechanical fixes
        run: |
          if git diff --quiet; then
            echo "No mechanical fixes were needed."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src
          git commit -m "apply Rust compiler and formatting fixes"
          git push origin HEAD:agent/smart-command-correction
