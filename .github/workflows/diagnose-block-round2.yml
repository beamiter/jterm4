name: Fix block round2 GTK traits

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    if: ${{ github.head_ref == 'agent/jterm1-block-parity-round2' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: agent/jterm1-block-parity-round2
          fetch-depth: 0

      - name: Add GTK extension traits
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/block_view/alt_screen.rs')
          text = path.read_text()
          needle = 'use gtk4::glib;\n'
          replacement = 'use gtk4::glib;\nuse gtk4::prelude::*;\n'
          if replacement not in text:
              if text.count(needle) != 1:
                  raise SystemExit('unexpected gtk4::glib import count')
              text = text.replace(needle, replacement, 1)
          path.write_text(text)
          PY
          cargo fmt --all
          rm -f .github/workflows/diagnose-block-round2.yml

      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: import GTK traits for finished block settling"
          git push origin HEAD:agent/jterm1-block-parity-round2
