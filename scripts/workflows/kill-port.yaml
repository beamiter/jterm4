name: "Kill process on port"
description: "Find and signal processes listening on a TCP port"
command: "lsof -ti tcp:{{port}} | xargs -r kill -{{signal}}"
tags: [network, diagnostics]
args:
  - name: port
    description: "TCP port"
    default: "3000"
  - name: signal
    description: "Signal to send (TERM, KILL, or HUP)"
    default: "TERM"
