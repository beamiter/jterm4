[package]
name = "jterm4"
version = "0.1.0"
edition = "2021"

[dependencies]
gdk4 = { version = "0.11.1", features = ["v4_14"] }
gtk4 = "0.11.1"
io-lifetimes = "2.0.3"
libadwaita = { version = "0.9", features = ["v1_5"] }
log = { version = "0.4.28", default-features = true, features = ["std"] }
nix = { version = "0.29", features = ["term", "signal", "process", "ioctl"] }
pcre2-sys = "0.2.9"
target-lexicon = "0.13.5"
toml = "1.1.0"
vte4 = { version = "0.10.0", features = ["v0_76"] }

[profile.release]
lto = true
codegen-units = 1
strip = true
panic = "abort"
