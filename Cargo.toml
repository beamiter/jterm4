[package]
name = "jterm4"
version = "0.1.0"
edition = "2021"

[dependencies]
gdk4 = { version = "0.11.2", features = ["v4_14"] }
gtk4 = "0.11.3"
io-lifetimes = "3.0.1"
libadwaita = { version = "0.9", features = ["v1_5"] }
log = { version = "0.4.29", default-features = true, features = ["std"] }
lru = "0.18"
nix = { version = "0.31.2", features = ["term", "signal", "process", "ioctl"] }
pcre2-sys = "0.2.10"
target-lexicon = "0.13.5"
toml = "1.1.2"
vte4 = { version = "0.10.0", features = ["v0_76"] }
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
zstd = "0.13"

[profile.release]
lto = true
codegen-units = 1
strip = true
panic = "abort"
